<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>

  <!-- CSS goes here -->
  <style>
/* From Uiverse.io by narmesh_sah */ 
.btn-container {
  position: relative;
  width: 200px;
  height: 60px;
  border: none;
  background: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
}
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f4f6f8; /* optional, just for nicer look */
}
.btn-back {
  width: 100%;
  height: 100%;
  border: 4px solid #6e737f;
  border-radius: 25px;
  background: #84d2dd;
  box-shadow:
    0 24px 24px rgba(0, 0, 0, 0.15),
    0 2px 0 rgba(0, 0, 0, 0.4);
  transition: all 0.3s ease;
}

.btn-front {
  position: absolute;
  width: 98%;
  height: 100%;
  background: linear-gradient(#dcdfe0 60%, #bec4c8 100%);
  border-radius: 22px;
  border: none;
  transform: translateY(-6px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.1rem;
  color: #395d7a;
  box-shadow:
    0 4px 4px #84d2dd,
    inset 0 -2px 2px #6e737f;
  transition: all 0.1s ease;
  overflow: hidden;
  animation: glow-up 2s infinite ease-in-out;
}
@keyframes glow-up {
  50% {
    transform: translateY(-8px);
    box-shadow:
      0 4px 12px #75e7f7,
      inset 0 -2px 2px #6e737f;
  }
}

.btn-front p {
  position: absolute;
  transition: all 0.3s ease;
}
.btn-front svg {
  position: absolute;
  left: 100%;
  transition: all 0.3s ease;
}

.btn-container:hover .btn-back {
  background: transparent;
  transform: translateY(4px);
  box-shadow:
    0 12px 12px rgba(0, 0, 0, 0.15),
    0 2px 0 rgba(0, 0, 0, 0.4);
}

.btn-container:hover .btn-front {
  transform: translateY(-8px);
  box-shadow: inset 0 -2px 2px #6e737f;
  animation: none;
}
.btn-container:hover .btn-front p {
  transform: translateX(-12px);
}
.btn-container:hover .btn-front svg {
  left: 80%;
}

.btn-container:active .btn-front {
  transform: translateY(2px);
  box-shadow:
    0 0 60px #75e7f7,
    inset 0 -2px 2px #6e737f;
}

  </style>
</head>

<body>

<!-- From Uiverse.io by narmesh_sah --> 
<button class="btn-container">
  <div class="btn-back"></div>
  <div class="btn-front">
    <p>GET STARTED</p>
    <svg
      width="24px"
      height="24px"
      viewBox="0 0 16 16"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
    >
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g
        id="SVGRepo_tracerCarrier"
        stroke-linecap="round"
        stroke-linejoin="round"
      ></g>
      <g id="SVGRepo_iconCarrier">
        <g fill="#395d7a">
          <path
            d="M8 2.5a5.494 5.494 0 00-4.558 2.42.75.75 0 01-1.242-.84 7 7 0 110 7.841.75.75 0 111.242-.841A5.5 5.5 0 108 2.5z"
          ></path>
          <path
            d="M7.245 4.695a.75.75 0 00-.05 1.06l1.36 1.495H1.75a.75.75 0 000 1.5h6.805l-1.36 1.495a.75.75 0 001.11 1.01l2.5-2.75a.75.75 0 000-1.01l-2.5-2.75a.75.75 0 00-1.06-.05z"
          ></path>
        </g>
      </g>
    </svg>
  </div>
</button>


</body>
</html>
