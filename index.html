<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swipe Button Redirect</title>

  <style>
    /* ===== YOUR FULL CSS (UNCHANGED) ===== */
    .liquid-container {
      --button-width: 20em;
      --button-height: 5em;
      --handle-size: 4em;
      --border-radius: 2.8em;
      --travel-distance: calc(var(--button-width) - var(--handle-size) - 0.8em);
      --primary-color: #718096;
      --success-color: #00c4ff;
      --glass-bg: rgba(255, 255, 255, 0.4);
      --text-color: #6a7fa4;
      --handle-color: #ffffff;
      font-family: Poppins, sans-serif;
      max-width: var(--button-width);
      max-height: 27.75em;
      perspective: 1000px;
      margin: 100px auto;
    }

    .liquid-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .liquid-button {
      position: relative;
      display: block;
      width: var(--button-width);
      height: var(--button-height);
      cursor: pointer;
      user-select: none;
      outline: none;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }

    .liquid-button:hover {
      transform: rotateX(8deg) rotateY(-10deg) scale(1.02);
    }

    .button-bg {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: var(--border-radius);
      background: linear-gradient(175deg, #d3e6ff 0%, #ffffff 100%);
      overflow: hidden;
      box-shadow: 0 0.4em 1em rgba(0,0,0,0.15);
    }

    .swipe-handle {
      position: absolute;
      left: 0.4em;
      top: 50%;
      transform: translateY(-50%);
      width: var(--handle-size);
      height: var(--handle-size);
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.8s ease;
      z-index: 10;
    }

    .icon-lock, .icon-unlock {
      position: absolute;
      width: 24px;
      height: 24px;
    }

    .icon-unlock {
      opacity: 0;
    }

    /* WHEN CHECKED (SWIPED) */
    .liquid-input:checked + .liquid-button .swipe-handle {
      transform: translateY(-50%) translateX(var(--travel-distance));
      background: #00c4ff;
    }

    .liquid-input:checked + .liquid-button .icon-lock {
      opacity: 0;
    }

    .liquid-input:checked + .liquid-button .icon-unlock {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="liquid-container">
  <input type="checkbox" id="swipe-btn" class="liquid-input" />

  <label for="swipe-btn" class="liquid-button">
    <div class="button-bg">

      <div class="swipe-handle">
        <!-- LOCK ICON -->
        <svg class="icon-lock" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path fill="black" d="M6 10h12v10H6z"/>
        </svg>

        <!-- UNLOCK ICON -->
        <svg class="icon-unlock" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path fill="black" d="M12 2a4 4 0 00-4 4v2h2V6a2 2 0 114 0h2a4 4 0 00-4-4z"/>
        </svg>
      </div>

    </div>
  </label>
</div>

<script>
  const swipeBtn = document.getElementById("swipe-btn");

  swipeBtn.addEventListener("change", function () {
    if (this.checked) {
      setTimeout(() => {
        window.location.href = "https://www.ebay.com.au";
      }, 600);
    }
  });
</script>

</body>
</html>
