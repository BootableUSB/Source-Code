<!DOCTYPE html>

<head>

  <!-- CSS goes here -->
  <style>
   /* From Uiverse.io by chandrasek_6406 */ 
.liquid-button {
  --button-width: 360px;
  --button-height: 90px;
  --handle-size: 70px;
  --padding: 10px;
  --bg-color: #dbe2ea;
  --shadow-light: rgba(255, 255, 255, 0.8);
  --shadow-dark: rgba(180, 190, 210, 0.8);
  --text-color-light: #a3b1c9;
  --text-unlocked: #374868;
  --glow-color-1: #d5f7ffb1;
  --glow-color-2: #ddffeeac;
  --glow-color-3: #f3ffe0b4;
  --anim-curve-flow: cubic-bezier(0.65, 0, 0.35, 1);
  position: relative;
}

.slider-container {
  position: relative;
  display: block;
  width: var(--button-width);
  height: var(--button-height);
  cursor: pointer;
  border-radius: calc(var(--button-height) / 2);
  -webkit-tap-highlight-color: transparent;
}

.toggle-input {
  display: none;
}

.slider-track {
  position: relative;
  width: 100%;
  height: 100%;
  background: var(--bg-color);
  border-radius: calc(var(--button-height) / 2);
  display: flex;
  align-items: center;
  box-shadow:
    inset -8px -8px 16px var(--shadow-light),
    inset 8px 8px 16px var(--shadow-dark),
    -8px -8px 16px var(--shadow-light),
    8px 8px 16px var(--shadow-dark);
  transition: box-shadow 0.6s var(--anim-curve-flow);
  overflow: hidden;
}

.iridescent-layer {
  position: absolute;
  inset: 0;
  background: conic-gradient(
    from var(--a, 0deg) at 50% 50%,
    var(--glow-color-1),
    var(--glow-color-2),
    var(--glow-color-3),
    var(--glow-color-2),
    var(--glow-color-1)
  );
  opacity: 0;
  transition: opacity 0.8s var(--anim-curve-flow);
  animation: shimmer 4s linear infinite paused;
}
.toggle-input:checked ~ .slider-track .iridescent-layer {
  opacity: 1;
  animation-play-state: running;
}

.handle {
  position: absolute;
  top: var(--padding);
  left: var(--padding);
  width: var(--handle-size);
  height: var(--handle-size);
  background: var(--bg-color);
  border-radius: 50%;
  z-index: 3;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow:
    -6px -6px 12px var(--shadow-light),
    6px 6px 12px var(--shadow-dark);
  transform: translateX(0);
  transition:
    transform 0.8s var(--anim-curve-flow),
    background-color 0.5s ease,
    box-shadow 0.5s ease;
}
.toggle-input:checked ~ .slider-track .handle {
  transform: translateX(
    calc(var(--button-width) - var(--handle-size) - var(--padding) * 2)
  );
  animation: handle-flow 0.8s var(--anim-curve-flow);
}

.icon {
  position: absolute;
  transition:
    opacity 0.5s ease,
    transform 0.5s ease;
  color: #5c6a82;
}
.icon-lock {
  width: 38px;
  height: 38px;
  opacity: 1;
  transform: scale(1);
}
.icon-unlock {
  width: 32px;
  height: 32px;
  opacity: 0;
  transform: scale(0.6) rotate(30deg);
  stroke-width: 2;
  z-index: 999;
}
.icon-unlock .shackle {
  transform-origin: 6px 10px;
  transition: transform 0.5s cubic-bezier(0.5, 1.8, 0.5, 1);
  transform: rotate(0deg);
}
.icon-unlock .body {
  transform-origin: center;
  transition: transform 0.5s cubic-bezier(0.5, 1.8, 0.5, 1);
  transform: scale(1);
}

.text-labels {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}
.label {
  display: flex;
  font-size: 1.5em;
  font-weight: 600;
  position: absolute;
  left: 115px;
}
.label-default {
  color: var(--text-color-light);
}
.label-unlocked {
  color: var(--text-unlocked);
}

.char {
  display: inline-block;
  transform: translateX(0);
  opacity: 1;
  transition:
    transform 0.6s var(--anim-curve-flow),
    opacity 0.6s var(--anim-curve-flow);
}
.label-unlocked .char {
  transform: translateX(-30px);
  opacity: 0;
}

.toggle-input:checked ~ .slider-track .icon-lock {
  opacity: 0;
  transform: scale(0.8) rotate(-30deg);
}
.toggle-input:checked ~ .slider-track .icon-unlock {
  opacity: 1;
  transform: scale(1) rotate(0deg);
  transition-delay: 0.1s;
}
.toggle-input:checked ~ .slider-track .icon-unlock .shackle {
  transform: rotate(-30deg);
  transition-delay: 0.2s;
}
.toggle-input:checked ~ .slider-track .icon-unlock .body {
  transform: scale(0.95);
  transition-delay: 0.2s;
}

.toggle-input:checked ~ .text-labels .label-default .char {
  transform: translateX(30px);
  opacity: 0;
  transition-delay: calc(var(--i) * 0.02s);
}
.toggle-input:checked ~ .text-labels .label-unlocked .char {
  transform: translateX(0);
  opacity: 1;
  transition-delay: calc(0.2s + var(--i) * 0.03s);
}

@keyframes shimmer {
  to {
    --a: 360deg;
  }
}
@keyframes handle-flow {
  0% {
    transform: translateX(0) scale(1, 1);
    border-radius: 50%;
  }
  20% {
    transform: translateX(20px) scale(1.1, 0.9);
    border-radius: 45% 55% 45% 55%;
  }
  50% {
    transform: translateX(calc(var(--button-width) * 0.5)) scale(1, 1);
    border-radius: 50%;
  }
  80% {
    transform: translateX(
        calc(
          var(--button-width) - var(--handle-size) - var(--padding) * 2 - 20px
        )
      )
      scale(1.1, 0.9);
    border-radius: 55% 45% 55% 45%;
  }
  100% {
    transform: translateX(
        calc(var(--button-width) - var(--handle-size) - var(--padding) * 2)
      )
      scale(1, 1);
    border-radius: 50%;
  }
}
/
  </style>
</head>

<body>

</div>
